bindd = SUPER SHIFT, S, Screenshot region, exec, ~/.local/share/omarchy/bin/omarchy-cmd-screenshot
bind = SUPER SHIFT, C, exec, omarchy-launch-or-focus-webapp Claude https://claude.ai

# Unbind PRINT key defaults (since you don't have it)
unbind = , PRINT
unbind = SHIFT, PRINT
unbind = CTRL, PRINT
unbind = ALT, PRINT
unbind = CTRL ALT, PRINT
unbind = SUPER, PRINT

# Full screen recording (toggle start/stop)
bindd = SUPER SHIFT, R, Screen recording, exec, ~/.local/share/omarchy/bin/omarchy-cmd-screenrecord output

# Disable SUPER + mouse wheel workspace switching
unbind = SUPER, mouse_up
unbind = SUPER, mouse_down

# Reset CapsLook behavior
input {
  kb_options = caps:capslock
}
